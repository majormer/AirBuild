[AccessTransformers]
; Friend access so the hook installer can take &AFGBuildableHologram::CheckValidPlacement (protected) to
; SUBSCRIBE to it - used to drop the UFGCDInvalidFloor ("Surface is too uneven!") disqualifier while air-placing.
Friend=(Class="AFGBuildableHologram", FriendClass="FAirBuildHologramHook")
